<body>
<div id="root"></div>

<script>
// Babel Standalone loads external `type="text/babel" src=...` files via XHR,
// which browsers block under the file:// protocol — opening this file directly
// would otherwise render a silent blank page. Show actionable guidance instead.
(function () {
  if (location.protocol !== 'file:') return;
  document.addEventListener('DOMContentLoaded', function () {
    var root = document.getElementById('root');
    if (!root) return;
    root.innerHTML =
      '<div style="max-width:560px;margin:14vh auto;padding:28px 32px;font:15px/1.6 ui-sans-serif,system-ui,sans-serif;color:#29261b;background:#faf9f7;border:1px solid #e7e3da;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.12)">' +
      '<h1 style="margin:0 0 10px;font-size:20px">Run Seatery from a local server</h1>' +
      '<p style="margin:0 0 14px;color:#57534e">This prototype uses in-browser Babel, which cannot load its <code>.jsx</code> files over <code>file://</code>. Start a small static server from this folder, then open the localhost link:</p>' +
      '<pre style="margin:0 0 14px;padding:12px 14px;background:#1c1917;color:#f5f5f4;border-radius:8px;overflow:auto;font:13px/1.5 ui-monospace,monospace">python3 -m http.server 8123</pre>' +
      '<p style="margin:0">Then open <a href="http://localhost:8123/index.html" style="color:#2563eb">http://localhost:8123/index.html</a></p>' +
      '</div>';
  });
})();
</script>

</body>
